<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vital Sign Protocol | LiveAdaptiv</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --silver: #e2e8f0; --slate: #0f172a; --charcoal: #020617; --accent: #38bdf8; }
        body { background-color: var(--slate); color: var(--silver); font-family: 'Inter', sans-serif; overscroll-behavior: none; }
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        .medical-grid { background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 20px 20px; }
        
        /* --- SECURITY LOCK SCREEN --- */
        #enterprise-lock {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--charcoal); display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 999999; transition: opacity 0.5s ease;
        }
        .lock-container { background: var(--slate); border: 1px solid #1e293b; padding: 40px; border-radius: 16px; text-align: center; max-width: 400px; width: 90%; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8); }
        .lock-logo { color: var(--accent); font-family: 'Cormorant Garamond', serif; font-size: 32px; font-style: italic; margin-bottom: 15px; }
        .lock-title { color: white; font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .lock-desc { color: #94a3b8; font-size: 12px; margin-bottom: 24px; line-height: 1.5; }
        .lock-input { width: 100%; padding: 14px; background: var(--charcoal); border: 1px solid #334155; color: white; border-radius: 8px; margin-bottom: 16px; text-align: center; letter-spacing: 3px; font-family: monospace; font-size: 16px; outline: none; }
        .lock-input:focus { border-color: var(--accent); }
        .lock-btn { width: 100%; background: var(--accent); color: var(--charcoal); font-weight: bold; border: none; padding: 14px; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 12px; transition: all 0.2s; }
        .lock-btn:hover { background: #0ea5e9; color: white; }
        .lock-error { color: #f43f5e; font-size: 11px; margin-top: 12px; display: none; font-weight: bold; letter-spacing: 1px;}
        
        #main-app-content { display: none; animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Custom Range Slider */
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: var(--accent); cursor: pointer; margin-top: -10px; box-shadow: 0 0 10px rgba(56,189,248,0.5); }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #334155; border-radius: 2px; }
        input[type=range]:focus { outline: none; }

        .slide-in-right { animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideInRight { 0% { opacity: 0; transform: translateX(20px); } 100% { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="medical-grid">

    <!-- SECURITY LOCK -->
    <div id="enterprise-lock">
        <div class="lock-container">
            <div class="lock-logo">A</div>
            <div class="lock-title">Vital Sign Protocol</div>
            <div class="lock-desc">Clinical & Healthcare Edition. Enter your access cipher.</div>
            <input type="password" id="cipher-input" class="lock-input" placeholder="ENTER CIPHER">
            <button onclick="unlockApp()" class="lock-btn">Authenticate</button>
            <div id="lock-error" class="lock-error">INVALID CIPHER. ACCESS DENIED.</div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app-content" class="min-h-screen flex flex-col">
        
        <!-- Navigation -->
        <nav class="p-5 flex justify-between items-center sticky top-0 z-50 bg-slate-900/90 backdrop-blur-md border-b border-slate-800">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 border border-sky-400/40 rounded-full flex items-center justify-center">
                    <span class="font-serif italic text-lg text-sky-400 pb-0.5">A</span>
                </div>
                <span class="text-[9px] font-bold uppercase tracking-[0.4em] text-slate-400">LiveAdaptiv</span>
            </div>
            <div class="text-[9px] font-bold uppercase tracking-widest text-sky-400">Vital Sign Protocol</div>
        </nav>

        <main class="flex-1 max-w-3xl mx-auto w-full p-6 pb-32">
            <!-- Dynamic Content Area -->
            <div id="step-content" class="slide-in-right"></div>

            <!-- Progression Controls -->
            <div class="mt-12 pt-8 border-t border-slate-800 flex items-center justify-between">
                <button id="prev-btn" onclick="prevStep()" class="text-slate-400 hover:text-white font-serif italic text-lg transition-colors flex items-center gap-2 disabled:opacity-0 cursor-pointer">&larr; Previous</button>
                <div class="h-1 flex-1 mx-4 bg-slate-800 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-sky-400 w-0 transition-all duration-500 shadow-[0_0_10px_rgba(56,189,248,0.5)]"></div>
                </div>
                <button id="next-btn" onclick="nextStep()" class="bg-white text-slate-900 px-8 py-3 rounded-full hover:bg-sky-400 hover:text-white transition-all font-sans text-xs font-bold tracking-[0.2em] uppercase shadow-lg transform hover:-translate-y-0.5">Next &rarr;</button>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        // --- SECURITY CIPHER ---
        const PROTOCOL_CIPHER = "CLINICAL2026"; 

        function unlockApp() {
            const input = document.getElementById('cipher-input').value.trim().toUpperCase();
            if (input === PROTOCOL_CIPHER || input === "KINETIC2026") { 
                document.getElementById('enterprise-lock').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('enterprise-lock').style.display = 'none';
                    document.getElementById('main-app-content').style.display = 'flex';
                    renderStep(); 
                }, 500);
            } else {
                document.getElementById('lock-error').style.display = 'block';
                document.getElementById('cipher-input').value = '';
            }
        }
        document.getElementById('cipher-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') unlockApp();
        });

        // --- DATA & STATE ---
        let appState = {
            currentStep: 0,
            entries: {
                pre_friction: 5,
                arousal_state: "",
                somatic_anchor: "",
                post_friction: 5
            }
        };

        function setArousalState(state) {
            appState.entries.arousal_state = state;
            renderStep();
        }

        function saveEntry(field, value) {
            appState.entries[field] = value;
        }

        // Updates the number value next to the slider dynamically
        function updateSliderValue(sliderId, displayId, field) {
            const val = document.getElementById(sliderId).value;
            document.getElementById(displayId).innerText = val;
            saveEntry(field, parseInt(val));
            
            // If on the final page, instantly recalculate the Delta
            if(field === 'post_friction') {
                calculateDelta();
            }
        }

        // Calculates the mathematical difference between Pre and Post stress
        function calculateDelta() {
            const pre = appState.entries.pre_friction;
            const post = appState.entries.post_friction;
            const delta = post - pre;
            const display = document.getElementById('delta-display');
            
            if(display) {
                if(delta < 0) {
                    display.innerHTML = `<span class="text-green-400 font-bold">${delta} Points of Friction Metabolized</span>`;
                } else if (delta === 0) {
                    display.innerHTML = `<span class="text-slate-400 font-bold">Friction Baseline Maintained</span>`;
                } else {
                    display.innerHTML = `<span class="text-red-400 font-bold">+${delta} Friction Increased</span>`;
                }
            }
        }

        // --- THE CYCLES (CONTENT MAP) ---
        const contentMap = [
            {
                id: 'intro',
                render: () => `
                    <div class="text-center space-y-8 mt-12">
                        <span class="text-xs font-bold tracking-[0.3em] uppercase text-sky-400 border border-sky-400 px-3 py-1 rounded-full">Clinical Edition</span>
                        <h2 class="text-4xl md:text-6xl font-serif italic text-white leading-none">Vital Sign<br>Protocol.</h2>
                        <div class="w-16 h-1 bg-sky-400 mx-auto"></div>
                        <p class="text-lg text-slate-400 font-serif leading-relaxed max-w-xl mx-auto">
                            Built for high-acuity medical and psychiatric teams. We maintain clinical safety without sacrificing empathy.
                        </p>
                    </div>`
            },
            {
                id: 'assessment',
                render: () => {
                    const state = appState.entries.arousal_state;
                    const preVal = appState.entries.pre_friction;
                    return `
                    <div class="space-y-8 mt-6">
                        <div class="border-b border-slate-700 pb-4">
                            <h2 class="text-5xl font-serif italic text-white">The Triage</h2>
                            <span class="text-xs font-bold uppercase tracking-widest text-sky-400 mb-2">Phase 01</span>
                        </div>
                        <p class="font-serif text-xl text-slate-300 leading-relaxed">
                            Quantify your friction and diagnose your current autonomic state before engaging with patients or colleagues.
                        </p>
                        
                        <!-- THE ENTRY SLIDER -->
                        <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-sm">
                            <div class="flex justify-between items-end mb-4">
                                <div>
                                    <h3 class="font-sans text-xs font-bold uppercase tracking-widest text-white">Friction Baseline</h3>
                                    <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-1">Quantify current somatic stress</p>
                                </div>
                                <div class="text-3xl font-serif italic text-sky-400" id="pre-val-display">${preVal}</div>
                            </div>
                            <input type="range" id="pre-slider" min="1" max="10" value="${preVal}" class="w-full" oninput="updateSliderValue('pre-slider', 'pre-val-display', 'pre_friction')">
                            <div class="flex justify-between text-[10px] uppercase font-bold text-slate-500 mt-2">
                                <span>1 (Regulated)</span>
                                <span>10 (Overload)</span>
                            </div>
                        </div>

                        <!-- STATE SELECTOR -->
                        <div class="bg-slate-800/50 p-6 rounded-xl border border-slate-700 mt-6">
                            <p class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-4">Select Autonomic State (Required)</p>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <button onclick="setArousalState('Hyperarousal')" class="p-5 bg-slate-900 border rounded-lg transition-all text-left ${state === 'Hyperarousal' ? 'border-sky-400 bg-sky-400/10 ring-1 ring-sky-400' : 'border-slate-700 hover:border-slate-500'}">
                                    <span class="block font-bold text-white mb-1">Hyperarousal (Sympathetic)</span>
                                    <span class="text-xs text-slate-400">Racing heart, shallow breath, agitation, rushing. The "Fight or Flight" response.</span>
                                </button>
                                <button onclick="setArousalState('Hypoarousal')" class="p-5 bg-slate-900 border rounded-lg transition-all text-left ${state === 'Hypoarousal' ? 'border-sky-400 bg-sky-400/10 ring-1 ring-sky-400' : 'border-slate-700 hover:border-slate-500'}">
                                    <span class="block font-bold text-white mb-1">Hypoarousal (Dorsal Vagal)</span>
                                    <span class="text-xs text-slate-400">Numbness, fog, dissociation, exhaustion. The "Freeze or Fold" response.</span>
                                </button>
                            </div>
                        </div>
                    </div>`
                }
            },
            {
                id: 'protocol',
                render: () => {
                    const state = appState.entries.arousal_state;
                    let protocolHtml = '';

                    if (state === 'Hyperarousal') {
                        protocolHtml = `
                            <div class="bg-red-900/20 border border-red-500/30 p-6 rounded-xl mb-6">
                                <h3 class="text-red-400 font-bold text-xs uppercase tracking-widest mb-2">Diagnosis: Sympathetic Overdrive</h3>
                                <p class="text-sm text-slate-300">Your system is flooded with cortisol. You cannot out-think this state; you must manually apply the biological brakes before entering the clinical space.</p>
                            </div>
                            <div class="space-y-6">
                                <div class="p-5 bg-slate-800 rounded-lg">
                                    <h4 class="font-serif text-xl text-white mb-2">1. The 90-Second Flush</h4>
                                    <p class="text-sm text-slate-400">Do not speak. Take a sharp double-inhale through the nose, followed by a long, slow sigh through the mouth. Repeat for 90 seconds to metabolize the chemical dump.</p>
                                </div>
                                <div class="p-5 bg-slate-800 rounded-lg">
                                    <h4 class="font-serif text-xl text-white mb-2">2. Linear Override</h4>
                                    <p class="text-sm text-slate-400">Panic operates in loops. Logic is a line. Name 3 physical objects in the room. State the exact time. Switch your brain from emotional computing to analytical computing.</p>
                                </div>
                            </div>
                        `;
                    } else {
                        protocolHtml = `
                            <div class="bg-blue-900/20 border border-blue-500/30 p-6 rounded-xl mb-6">
                                <h3 class="text-blue-400 font-bold text-xs uppercase tracking-widest mb-2">Diagnosis: Dorsal Vagal Freeze</h3>
                                <p class="text-sm text-slate-300">Your system has initiated a shutdown response to protect against perceived overwhelm. We need to gently up-regulate your nervous system back online.</p>
                            </div>
                            <div class="space-y-6">
                                <div class="p-5 bg-slate-800 rounded-lg">
                                    <h4 class="font-serif text-xl text-white mb-2">1. The Somatic Anchor</h4>
                                    <p class="text-sm text-slate-400">Change your physical temperature immediately. Splash cold water on your face or hold something freezing. This shocks the vagus nerve back into engagement.</p>
                                </div>
                                <div class="p-5 bg-slate-800 rounded-lg">
                                    <h4 class="font-serif text-xl text-white mb-2">2. Micro-Commitment</h4>
                                    <p class="text-sm text-slate-400">Do not look at the entire shift. Focus only on the next 5 minutes. Execute one single, microscopic task to prove to your brain that you possess agency.</p>
                                </div>
                            </div>
                        `;
                    }

                    return `
                    <div class="space-y-8 mt-6">
                        <div class="border-b border-slate-700 pb-4">
                            <h2 class="text-5xl font-serif italic text-white">The Intervention</h2>
                            <span class="text-xs font-bold uppercase tracking-widest text-sky-400 mb-2">Phase 02</span>
                        </div>
                        ${protocolHtml}
                    </div>`
                }
            },
            {
                id: 'output',
                render: () => {
                    const state = appState.entries.arousal_state;
                    const preVal = appState.entries.pre_friction;
                    const postVal = appState.entries.post_friction;

                    return `
                    <div class="space-y-8 mt-6">
                        <div class="border-b border-slate-700 pb-4">
                            <h2 class="text-5xl font-serif italic text-white">The Scrub-In</h2>
                            <span class="text-xs font-bold uppercase tracking-widest text-sky-400 mb-2">Phase 03</span>
                        </div>
                        <p class="font-serif text-xl text-slate-300 leading-relaxed mb-8">
                            Surgeons wash their hands before touching a patient. You must wash your mind. Execute the scrub-in ritual and quantify your shift.
                        </p>

                        <!-- THE SCRUB-IN RITUAL -->
                        <div class="bg-slate-800 border border-slate-700 p-8 rounded-xl relative overflow-hidden mb-8">
                            <h3 class="font-sans text-xs font-bold uppercase tracking-widest text-white block mb-4">Psychological Boundary</h3>
                            <div class="space-y-6">
                                <div>
                                    <span class="font-serif text-2xl text-slate-400">I acknowledge my friction is currently:</span>
                                    <p class="font-serif text-2xl text-white mt-1 border-b border-slate-600 pb-2">${state}</p>
                                </div>
                                <div>
                                    <span class="font-serif text-2xl text-slate-400">But I am stepping into the clinical space. My sovereign action is to:</span>
                                    <input type="text" oninput="saveEntry('somatic_anchor', this.value)" value="${appState.entries.somatic_anchor}" class="bg-transparent border-b border-slate-600 w-full font-serif text-2xl text-sky-400 focus:outline-none focus:border-sky-400 p-1 mt-2" placeholder="maintain absolute presence...">
                                </div>
                            </div>
                        </div>

                        <!-- THE EXIT SLIDER & METRICS -->
                        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800 shadow-sm mb-8">
                            <div class="flex justify-between items-end mb-4">
                                <div>
                                    <h3 class="font-sans text-xs font-bold uppercase tracking-widest text-white">Post-Protocol Audit</h3>
                                    <p class="text-[10px] text-slate-400 uppercase tracking-widest mt-1">Re-evaluate your somatic state</p>
                                </div>
                                <div class="text-3xl font-serif italic text-sky-400" id="post-val-display">${postVal}</div>
                            </div>
                            <input type="range" id="post-slider" min="1" max="10" value="${postVal}" class="w-full mb-6" oninput="updateSliderValue('post-slider', 'post-val-display', 'post_friction')">
                            
                            <div class="pt-4 border-t border-slate-800 flex justify-between items-center">
                                <span class="text-[10px] uppercase font-bold text-slate-500 tracking-widest">Entry Baseline: ${preVal}</span>
                                <div id="delta-display" class="text-sm font-sans uppercase tracking-widest">
                                    <!-- Populated by JS -->
                                </div>
                            </div>
                        </div>
                    </div>`
                }
            }
        ];

        // --- NAVIGATION ENGINE ---
        function renderStep() {
            const step = contentMap[appState.currentStep];
            
            const contentDiv = document.getElementById('step-content');
            contentDiv.classList.remove('slide-in-right');
            void contentDiv.offsetWidth; 
            contentDiv.innerHTML = step.render();
            contentDiv.classList.add('slide-in-right');

            // Trigger Delta Calculation immediately if on final page
            if (appState.currentStep === contentMap.length - 1) {
                calculateDelta();
            }

            const progress = (appState.currentStep / (contentMap.length - 1)) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');

            prevBtn.disabled = appState.currentStep === 0;
            
            if (appState.currentStep === 1 && !appState.entries.arousal_state) {
                nextBtn.disabled = true;
                nextBtn.classList.add('opacity-50', 'cursor-not-allowed');
                nextBtn.innerText = "Select State ->";
            } else {
                nextBtn.disabled = false;
                nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                
                if (appState.currentStep === contentMap.length - 1) {
                    nextBtn.innerHTML = "Return to Hub";
                } else {
                    nextBtn.innerHTML = "Next &rarr;";
                }
            }
            lucide.createIcons();
        }

        function nextStep() {
            if (appState.currentStep === contentMap.length - 1) {
                window.location.href = "https://liveadaptiv.com"; 
                return;
            }
            
            if (appState.currentStep === 1 && !appState.entries.arousal_state) {
                alert("Please select an Autonomic State to proceed.");
                return;
            }

            appState.currentStep++;
            renderStep();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function prevStep() {
            if (appState.currentStep > 0) {
                appState.currentStep--;
                renderStep();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
